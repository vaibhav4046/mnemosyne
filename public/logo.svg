<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="55%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
  </defs>

  <rect x="1" y="1" width="62" height="62" rx="15" fill="url(#bg)"/>
  <rect x="1" y="1" width="62" height="62" rx="15" fill="url(#glow)" opacity="0.6"/>

  <g stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.95">
    <line x1="16" y1="48" x2="16" y2="20"/>
    <line x1="16" y1="20" x2="32" y2="36"/>
    <line x1="32" y1="36" x2="48" y2="20"/>
    <line x1="48" y1="20" x2="48" y2="48"/>
    <line x1="16" y1="48" x2="48" y2="48" stroke-dasharray="2 3" opacity="0.5"/>
  </g>

  <g fill="white" filter="url(#softglow)">
    <circle cx="16" cy="48" r="3.2"/>
    <circle cx="16" cy="20" r="3.2"/>
    <circle cx="32" cy="36" r="3.2"/>
    <circle cx="48" cy="20" r="3.2"/>
    <circle cx="48" cy="48" r="3.2"/>
  </g>
  <g fill="white">
    <circle cx="16" cy="48" r="2"/>
    <circle cx="16" cy="20" r="2"/>
    <circle cx="32" cy="36" r="2.4"/>
    <circle cx="48" cy="20" r="2"/>
    <circle cx="48" cy="48" r="2"/>
  </g>
</svg>
